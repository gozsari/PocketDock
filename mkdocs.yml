site_name: PocketDock
site_description: Automated molecular docking pipeline with P2Rank pocket prediction, AutoDock Vina docking, and interactive 3Dmol.js visualization.
site_author: PocketDock Contributors
site_url: https://pocketdock.readthedocs.io/en/latest/

# Update repo_url after creating the GitHub repository
repo_url: https://github.com/gozsari/PocketDock
repo_name: gozsari/PocketDock
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gozsari/PocketDock

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - User Guide:
      - Uploading a Job: user-guide/uploading.md
      - Monitoring Progress: user-guide/monitoring.md
      - Queue: user-guide/queue.md
      - The Results Page: user-guide/results.md
      - 3D Viewer Controls: user-guide/3d-viewer.md
      - Interaction Analysis: user-guide/interactions.md
  - Interpreting Results: interpreting-results.md
  - API Reference: api.md
  - Configuration: configuration.md
  - Troubleshooting: troubleshooting.md
