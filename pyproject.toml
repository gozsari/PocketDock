[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "pocketdock.settings"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "migrations",
    "staticfiles",
    "media",
    "venv",
    ".venv",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.format]
quote-style = "double"
